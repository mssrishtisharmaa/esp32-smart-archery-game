  <!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <title>🎯 Archery Game</title>
  <link rel="stylesheet" href="style.css">
  
  </head>
  <body>

    <!-- LOGIN -->
    <div id="loginScreen">
      <h1>🎯 Archery Game</h1>
      <p style="margin-bottom:20px;color:rgba(255,255,255,.7)">Enter your name to begin</p>
      <input id="nameInput" type="text" placeholder="Player Name" maxlength="20" autofocus>
      <button id="enterBtn">Enter Game</button>
    </div>

    <!-- MAIN -->
    <div id="mainScreen">
      <div class="topbar">
        <h1>🎯 Archery Game</h1>
        <div class="stats">
          <span>👤 <strong id="playerLabel">—</strong></span>
          <span class="level-badge">Level <strong id="levelEl">1</strong></span>
          <span>Score: <strong id="score">0</strong></span>
          <span>Round: <strong id="round">0</strong> / 5</span>
        </div>
        <div class="controls">
          <button id="startBtn">Start Level 1</button>
          <button id="logoutBtn" style="background:#555">Logout</button>
        </div>
      </div>

      <div class="layout">
        <div>
          <div id="gameArea">
            <!-- Level 1 elements -->
            <div id="targetL1"></div>
            <div id="arrow"></div>
            <!-- Level 2 elements -->
            <div id="targetSmall" class="target2"><span class="target-label">5 pts</span></div>
            <div id="targetBig" class="target2"><span class="target-label">10 pts</span></div>
            <div id="ground"></div>

            <!-- Game Over overlay -->
            <div id="gameOver">
              <h2 id="goTitle">🏆 Level Complete</h2>
              <p class="summary">Player: <strong id="goPlayer">—</strong></p>
              <p class="summary">Level 1 Score: <strong id="goL1">0</strong></p>
              <p class="summary" id="goL2Row" style="display:none">Level 2 Score: <strong id="goL2">0</strong></p>
              <p class="summary">Final Score: <strong id="goFinal">0</strong></p>
              <p class="lock-msg" id="lockMsg" style="display:none">🔒 Level 2 Locked — score 40+ required</p>
              <div class="actions">
                <button id="playL2Btn" class="unlock" style="display:none">🔓 Play Level 2</button>
                <button id="restartBtn">Play Again</button>
              </div>
            </div>
          </div>
          <div id="message"></div>
          <div class="hint" id="hintText">Press SPACEBAR to shoot the arrow</div>
          <div class="sensor-row" id="sensorRow">
            <button class="sensor-btn s1" id="sensor1Btn">📡 IR1 → Small (+10)</button>
            <button class="sensor-btn s2" id="sensor2Btn">📡 IR2 → Big (+5)</button>
          </div>
        </div>
        <div id="leaderboard">
          <h2>🏆 Top 10 (Final Score)</h2>
          <ol id="lbList"></ol>
        </div>
      </div>
    </div>


<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="config.js"></script>
<script src="game.js"></script>
<script src="script.js"></script>
  </body>
  </html>
