  <!DOCTYPE html>
  <html lang="en">
  <head>

  <title>🎯 Archery Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3a5f, #0f1b3d);
      color: #fff;
      padding: 20px;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body.miss { background: #8b1a1a; }
    body.flash { background: #1a6b3a; }
    h1 { font-size: 1.8rem; text-shadow: 0 2px 8px rgba(0,0,0,.4); }

    /* ---------- LOGIN ---------- */
    #loginScreen {
      background: rgba(255,255,255,.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.1);
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
      width: min(400px, 90vw);
    }
    #loginScreen h1 { margin-bottom: 24px; }
    #loginScreen input {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(0,0,0,.3);
      color: #fff;
      margin-bottom: 16px;
      outline: none;
    }
    #loginScreen input:focus { border-color: #e85d3a; }
    button {
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: #e85d3a;
      color: #fff;
      cursor: pointer;
      transition: background .2s, transform .15s;
    }
    button:hover:not(:disabled) { background: #ff7752; transform: translateY(-2px); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    button.locked { background: #555; cursor: not-allowed; }
    button.unlock { background: #27ae60; }
    button.unlock:hover:not(:disabled) { background: #2ecc71; }

    /* ---------- MAIN ---------- */
    #mainScreen { display: none; width: 100%; max-width: 1100px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,.06);
      padding: 14px 22px;
      border-radius: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .topbar .stats { display: flex; gap: 12px; flex-wrap: wrap; }
    .topbar .stats span {
      background: rgba(0,0,0,.25);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: .9rem;
    }
    .level-badge {
      background: linear-gradient(135deg, #f4d03f, #e85d3a) !important;
      color: #0f1b3d;
      font-weight: 700;
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 20px;
    }
    @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }

    /* Game Area */
    #gameArea {
      position: relative;
      width: 100%;
      height: 480px;
      background: linear-gradient(to bottom, #0a1628 0%, #0a1628 70%, #1a3520 100%);
      border: 2px solid rgba(255,255,255,.15);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,.4);
    }

    /* ---------- LEVEL 1: single target + arrow ---------- */
    #targetL1 {
      position: absolute;
      top: 40px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff 8%, #e74c3c 18%, #fff 28%, #e74c3c 38%, #fff 48%, #e74c3c 58%);
      box-shadow: 0 0 25px rgba(231,76,60,.6);
      transition: background .2s, transform .2s, box-shadow .2s;
      display: none;
    }
    #targetL1.hit {
      background: radial-gradient(circle, #fff 8%, #2ecc71 18%, #fff 28%, #2ecc71 50%);
      transform: scale(1.25);
      box-shadow: 0 0 35px rgba(46,204,113,.9);
    }
    #arrow {
      position: absolute;
      bottom: 20px;
      width: 6px;
      height: 50px;
      transform: translateX(-50%);
      pointer-events: none;
      display: none;
    }
    #arrow::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, #f4d03f, #b8860b);
      border-radius: 3px;
    }
    #arrow::after {
      content: '';
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-bottom: 12px solid #ecf0f1;
    }
    @keyframes shoot {
      0% { bottom: 20px; opacity: 1; }
      100% { bottom: var(--shoot-end, 380px); opacity: 1; }
    }
    #arrow.shooting { animation: shoot .35s linear forwards; }

    /* ---------- LEVEL 2: two moving targets ---------- */
    .target2 {
      position: absolute;
      border-radius: 50%;
      will-change: left;
      display: none;
    }
    .target2.flash {
      box-shadow: 0 0 50px 20px rgba(46, 204, 113, .9) !important;
      transform: scale(1.25);
    }
    #targetSmall {
      top: 70px;
      width: 70px;
      height: 70px;
      background: radial-gradient(circle, #fff 8%, #e74c3c 18%, #fff 28%, #e74c3c 38%, #fff 48%, #e74c3c 58%);
      box-shadow: 0 0 25px rgba(231,76,60,.6);
      transition: box-shadow .2s, transform .2s;
    }
    #targetBig {
      top: 220px;
      width: 50px;
      height: 50px;
      background: radial-gradient(circle, #fff 6%, #3498db 14%, #fff 22%, #3498db 30%, #fff 38%, #3498db 46%, #fff 54%, #3498db 62%);
      box-shadow: 0 0 18px rgba(52,152,219,.6);
      transition: box-shadow .2s, transform .2s;
    }
    .target-label {
      position: absolute;
      font-size: .7rem;
      font-weight: 700;
      color: #fff;
      background: rgba(0,0,0,.6);
      padding: 2px 6px;
      border-radius: 4px;
      pointer-events: none;
      transform: translate(-50%, -120%);
      left: 50%;
    }

    #ground {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 12px;
      background: linear-gradient(to bottom, #2d4a2d, #1a3520);
    }
    #message {
      margin-top: 14px;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 600;
      min-height: 28px;
    }
    .hint { text-align: center; color: rgba(255,255,255,.6); font-size: .85rem; margin-top: 6px; min-height: 20px; }

    /* Sensor sim controls (Level 2) */
    .sensor-row {
      display: none;
      gap: 10px;
      justify-content: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .sensor-row.show { display: flex; }
    .sensor-btn { padding: 10px 18px; font-size: .9rem; }
    .sensor-btn.s1 { background: #c0392b; }
    .sensor-btn.s1:hover:not(:disabled) { background: #e74c3c; }
    .sensor-btn.s2 { background: #2980b9; }
    .sensor-btn.s2:hover:not(:disabled) { background: #3498db; }

    /* Leaderboard */
    #leaderboard {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      padding: 18px;
      height: fit-content;
    }
    #leaderboard h2 {
      font-size: 1.05rem;
      margin-bottom: 12px;
      color: #f4d03f;
      text-align: center;
    }
    #leaderboard ol { list-style: none; counter-reset: rank; }
    #leaderboard li {
      counter-increment: rank;
      display: flex;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 4px;
      background: rgba(0,0,0,.2);
      font-size: .85rem;
    }
    #leaderboard li::before {
      content: counter(rank) ".";
      margin-right: 8px;
      color: #e85d3a;
      font-weight: 700;
      min-width: 22px;
    }
    #leaderboard li .pname { flex: 1; }
    #leaderboard li .pscore { font-weight: 700; color: #f4d03f; }
    #leaderboard li.me { background: rgba(232,93,58,.3); border: 1px solid #e85d3a; }

    .controls { display: flex; gap: 8px; flex-wrap: wrap; }

    /* Game Over overlay */
    #gameOver {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(10,22,40,.94);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      border-radius: 12px;
      padding: 20px;
      animation: fadeIn .4s ease-out;
    }
    #gameOver.show { display: flex; }
    #gameOver h2 { font-size: 2.2rem; margin-bottom: 12px; color: #f4d03f; }
    #gameOver .summary { font-size: 1.05rem; margin-bottom: 8px; }
    #gameOver .summary strong { color: #f4d03f; }
    #gameOver .actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
    #gameOver .lock-msg { color: #e74c3c; margin-top: 12px; font-size: .9rem; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>

    function renderLeaderboard() {
  firebase.database().ref("leaderboard")
    .orderByChild("finalScore")
    .limitToLast(10)
    .on("value", snapshot => {

      const data = [];
      snapshot.forEach(child => {
        data.push(child.val());
      });

      data.reverse(); // highest first

      lbList.innerHTML = "";

      data.forEach(p => {
        const li = document.createElement('li');
        li.innerHTML = `
          <span class="pname">${p.name}</span>
          <span class="pscore">${p.finalScore}</span>
        `;
        lbList.appendChild(li);
      });
    });
}
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    // ============================================================
    // LEVEL 1 — single target + arrow (UNCHANGED LOGIC)
    // ============================================================
    function setupLevel1UI() {
      state.level = 1;
      levelEl.textContent = '1';
      // Show L1 elements
      targetL1.style.display = 'block';
      arrow.style.display    = 'block';
      // Hide L2 elements
      t2.small.el.style.display = 'none';
      t2.big.el.style.display   = 'none';
      sensorRow.classList.remove('show');
      hintText.textContent = 'Level 1 — Aim and hit using IR sensor (real arrow trigger)';
      startBtn.textContent = 'Start Level 1';
      startBtn.disabled = false;
      positionTargetL1();
      startArrowLoop();
    }

    function positionTargetL1() {
      const maxX = gameArea.clientWidth - targetL1.offsetWidth;
      targetL1.style.left = (Math.random() * maxX) + 'px';
    }

    function startArrowLoop() {
      if (animId) cancelAnimationFrame(animId);
      let last = performance.now();
      const speed = 60; // % per second
      function tick(now) {
        const dt = (now - last) / 1000;
        last = now;
        // Arrow oscillates in both levels
        if (!arrow.classList.contains('shooting')) {
          arrowX += arrowDir * speed * dt;
          if (arrowX >= 98) { arrowX = 98; arrowDir = -1; }
          if (arrowX <= 2)  { arrowX = 2;  arrowDir = 1;  }
          arrow.style.left = arrowX + '%';
        }
        // Drive both L2 targets when in level 2
        if (state.level === 2) {
          const maxX = gameArea.clientWidth;
          for (const k in t2) {
            const t = t2[k];
            t.x += t.dir * t.speed * dt;
            if (t.x <= 0)              { t.x = 0;            t.dir = 1; }
            if (t.x >= maxX - t.w)     { t.x = maxX - t.w;   t.dir = -1; }
            t.el.style.left = t.x + 'px';
          }
        }
        animId = requestAnimationFrame(tick);
      }
      animId = requestAnimationFrame(tick);
    }

    function shootL1() {
      if (state.level !== 1 || !state.playing || !state.canHit) return;
      state.canHit = false;

      const endBottom = gameArea.clientHeight - 60;
      arrow.style.setProperty('--shoot-end', endBottom + 'px');
      arrow.style.left = arrowX + '%';
      arrow.classList.add('shooting');

      const arrowPx = (arrowX / 100) * gameArea.clientWidth;
      const targetLeft = parseFloat(targetL1.style.left);
      const targetCenter = targetLeft + targetL1.offsetWidth / 2;
      const dist = Math.abs(arrowPx - targetCenter);
      const hit = dist <= HIT_TOLERANCE;

      setTimeout(() => {
        if (hit) {
          state.score += 10;
          scoreEl.textContent = state.score;
          targetL1.classList.add('hit');
          message.textContent = '🎯 HIT! +10';
          message.style.color = '#2ecc71';
          playBeep(880);
        } else {
          flashMiss();
          message.textContent = '❌ MISS';
          message.style.color = '#e74c3c';
          playBeep(220);
        }
        setTimeout(() => {
          arrow.classList.remove('shooting');
          arrow.style.left = arrowX + '%';
          targetL1.classList.remove('hit');
          nextRound();
        }, 600);
      }, 350);
    }

    // ============================================================
    // LEVEL 2 — two moving targets (ESP32 IR sensors)
    // ============================================================
    function setupLevel2UI() {
      state.level = 2;
      levelEl.textContent = '2';
      // Hide L1 target, KEEP arrow visible (L2 also uses arrow)
      targetL1.style.display = 'none';
      arrow.style.display    = 'block';
      arrow.classList.remove('shooting');
      // Show L2
      t2.small.el.style.display = 'block';
      t2.big.el.style.display   = 'block';
      sensorRow.classList.add('show');
      hintText.textContent = 'Level 2 — Sensor-based shooting 🎯 Hit targets to score: Small (+10), Big (+5)';
      startBtn.textContent = 'Start Level 2';
      startBtn.disabled = false;
      // Make sure arrow oscillation loop is running (started in setupLevel1UI)
      if (!animId) startArrowLoop();
      // Place both targets at fixed positions (stationary)
      positionTargetsL2();
    }

    // function positionTargetsL2() {
    //   const w = gameArea.clientWidth;
    //   // Red (small/10pts) on the left third; Blue (5pts) on the right third
    //   t2.small.x = Math.max(0, w * 0.25 - t2.small.w / 2);
    //   t2.big.x   = Math.max(0, w * 0.72 - t2.big.w / 2);
    //   t2.small.el.style.left = t2.small.x + 'px';
    //   t2.big.el.style.left   = t2.big.x   + 'px';
    // }
  function positionTargetsL2() {
    const maxX = gameArea.clientWidth;

    // Random positions like Level 1
    t2.small.x = Math.random() * (maxX - t2.small.w);
    t2.big.x   = Math.random() * (maxX - t2.big.w);

    t2.small.el.style.left = t2.small.x + 'px';
    t2.big.el.style.left   = t2.big.x + 'px';
  }
    // Direct-hit handler (sensor / click / key 1-2). Skips arrow animation.
    // function registerHitL2(type) {
    //   if (state.level !== 2 || !state.playing || !state.canHit) return;
    //   if (type !== 'small' && type !== 'big') return;
    //   state.canHit = false;

    //   const points = POINTS_L2[type];
    //   state.score += points;
    //   scoreEl.textContent = state.score;

    //   const el = t2[type].el;
    //   el.classList.add('flash');
    //   document.body.classList.add('flash');
    //   playBeep(type === 'small' ? 880 : 520);
    //   setTimeout(() => {
    //     el.classList.remove('flash');
    //     document.body.classList.remove('flash');
    //   }, 300);

    //   message.textContent = `🎯 HIT ${type.toUpperCase()} +${points}`;
    //   message.style.color = type === 'small' ? '#e74c3c' : '#3498db';

    //   setTimeout(nextRound, 700);
    // }

    // Arrow-shoot handler for Level 2 — fires arrow, checks both targets
    function shootL2() {
      if (state.level !== 2 || !state.playing || !state.canHit) return;
      state.canHit = false;

      const endBottom = gameArea.clientHeight - 60;
      arrow.style.setProperty('--shoot-end', endBottom + 'px');
      arrow.style.left = arrowX + '%';
      arrow.classList.add('shooting');

      const arrowPx = (arrowX / 100) * gameArea.clientWidth;

      // Check both targets — small wins on tie (it's worth more)
      let hitType = null;
      let bestDist = Infinity;
      for (const k of ['small', 'big']) {
        const t = t2[k];
        const center = t.x + t.w / 2;
        const dist = Math.abs(arrowPx - center);
        // Hit if arrow lands within target radius
        if (dist <= t.w / 2 && dist < bestDist) {
          bestDist = dist;
          hitType = k;
        }
      }

      setTimeout(() => {
        if (hitType) {
          const points = POINTS_L2[hitType];
          state.score += points;
          scoreEl.textContent = state.score;
          const el = t2[hitType].el;
          el.classList.add('flash');
          document.body.classList.add('flash');
          playBeep(hitType === 'small' ? 880 : 520);
          setTimeout(() => {
            el.classList.remove('flash');
            document.body.classList.remove('flash');
          }, 300);
          message.textContent = `🎯 HIT ${hitType.toUpperCase()} +${points}`;
          message.style.color = hitType === 'small' ? '#e74c3c' : '#3498db';
        } else {
          flashMiss();
          message.textContent = '❌ MISS';
          message.style.color = '#e74c3c';
          playBeep(220);
        }
        setTimeout(() => {
          arrow.classList.remove('shooting');
          arrow.style.left = arrowX + '%';
          nextRound();
        }, 600);
      }, 350);
    }

    // ============================================================
    // SHARED GAME FLOW
    // ============================================================
    function startGame(level) {
      state.level = level;
      state.score = 0;
      state.round = 0;
      state.isGameOver = false;
      state.playing = true;
      scoreEl.textContent = 0;
      message.textContent = '';
      gameOverEl.classList.remove('show');

      if (level === 1) setupLevel1UI();
      else setupLevel2UI();

      startBtn.disabled = true;
      startBtn.textContent = level === 1 ? 'Playing L1...' : 'Playing L2...';
      nextRound();
    }

    function nextRound() {
      if (state.round >= TOTAL_ROUNDS) return endLevel();
      state.round++;
      roundEl.textContent = state.round;
      state.canHit = true;
      if (state.level === 1) {
        positionTargetL1();
        message.textContent = `Round ${state.round} — aim and SHOOT`;
      } 
      else {
    positionTargetsL2(); // 🔥 IMPORTANT
    message.textContent = `Round ${state.round} — aim at small (5) or big (10)`;
  }
      message.style.color = '#fff';
    }

    function endLevel() {
      state.playing = false;
      state.canHit = false;
      state.isGameOver = true;

      // Save score for the level just completed
      if (state.level === 1) state.level1Score = state.score;
      else state.level2Score = state.score;

      saveScore();
      renderLeaderboard('local_' + state.playerName.toLowerCase());

      // Populate Game Over overlay
      const finalScore = state.level1Score + state.level2Score;
      goPlayer.textContent = state.playerName;
      goL1.textContent = state.level1Score;
      goL2.textContent = state.level2Score;
      goFinal.textContent = finalScore;

      if (state.level === 1) {
        goTitle.textContent = '🏁 Level 1 Complete';
        goL2Row.style.display = 'none';
        const unlocked = state.level1Score >= UNLOCK_THRESHOLD;
        playL2Btn.style.display = 'inline-block';
        if (unlocked) {
          playL2Btn.disabled = false;
          playL2Btn.classList.remove('locked');
          playL2Btn.classList.add('unlock');
          playL2Btn.textContent = '🔓 Play Level 2';
          lockMsg.style.display = 'none';
        } else {
          playL2Btn.disabled = true;
          playL2Btn.classList.add('locked');
          playL2Btn.classList.remove('unlock');
          playL2Btn.textContent = `🔒 Level Locked (${UNLOCK_THRESHOLD}+ required)`;
          lockMsg.style.display = 'block';
        }
        restartBtn.textContent = 'Replay Level 1';
      } else {
        goTitle.textContent = '🏆 Game Over';
        goL2Row.style.display = 'block';
        playL2Btn.style.display = 'none';
        lockMsg.style.display = 'none';
        restartBtn.textContent = 'Restart from Level 1';
      }

      startBtn.disabled = false;
      startBtn.textContent = state.level === 1 ? 'Start Level 1' : 'Start Level 2';
      gameOverEl.classList.add('show');
    }

    function flashMiss() {
      document.body.classList.add('miss');
      setTimeout(() => document.body.classList.remove('miss'), 200);
    }

    // ---------- AUDIO FEEDBACK ----------
    let audioCtx = null;
    function playBeep(freq) {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.frequency.value = freq;
        o.type = 'square';
        g.gain.value = 0.08;
        o.connect(g); g.connect(audioCtx.destination);
        o.start();
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.18);
        o.stop(audioCtx.currentTime + 0.2);
      } catch (e) {}
    }

    // ---------- INPUT ----------
    document.addEventListener('keydown', e => {
      if (state.level === 1 && e.code === 'Space') {
        e.preventDefault();
        shootL1();
      } else if (state.level === 2) {
        if (e.code === 'Space') { e.preventDefault(); shootL2(); }
      }
    });
  

    startBtn.addEventListener('click', () => startGame(state.level));
    playL2Btn.addEventListener('click', () => { if (!playL2Btn.disabled) startGame(2); });
    restartBtn.addEventListener('click', () => {
      if (state.level === 2) {
        // Full reset to Level 1
        state.level1Score = 0;
        state.level2Score = 0;
      }
      startGame(state.level === 2 ? 1 : 1);
    });

    // ---------- HARDWARE HOOK (ESP32) ----------
    // Backend / WebSocket / Firebase listener calls:
    //   window.onSensorTrigger(1) -> IR1 / Small / +10
    //   window.onSensorTrigger(2) -> IR2 / Big   / +5
    // Active only during Level 2.


    // ---------- LOGOUT ----------
    $('logoutBtn').addEventListener('click', () => {
      if (animId) cancelAnimationFrame(animId);
      animId = null;
      Object.assign(state, {
        playerName: '', level: 1, round: 0, score: 0,
        level1Score: 0, level2Score: 0,
        isGameOver: false, playing: false, canHit: false,
      });
      scoreEl.textContent = 0;
      roundEl.textContent = 0;
      levelEl.textContent = 1;
      message.textContent = '';
      gameOverEl.classList.remove('show');
      arrow.classList.remove('shooting');
      targetL1.classList.remove('hit');
      startBtn.disabled = false;
      startBtn.textContent = 'Start Level 1';
      mainScreen.style.display = 'none';
      loginScreen.style.display = 'block';
      nameInput.value = '';
      nameInput.focus();
    });
  </script>
